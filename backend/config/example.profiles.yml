version: 1

# Gaussian noise applied to exported preference weights (0 = deterministic).
# It changes each preference weight explicitly marked with noise_target: true
latent_class_noise_std: 0.1

# default checked profiles in the UI
default_allowed:
  - cost_efficient
  - time_efficient
  - prefers_car
  - prefers_bike
  - prefers_pt
  - multimodal_flexible

default_preferences:
  - { id: fastest_route, metric: duration, objective: minimize, weight: 0.20 }
  - { id: shortest_distance, metric: distance, objective: minimize, weight: 0.10 }
  - { id: cheapest_option, metric: price, objective: minimize, weight: 0.70 }

# Tie-break order when two profiles have the same total score (first wins)
profile_order:
  - cost_efficient
  - time_efficient
  - prefers_car
  - prefers_bike
  - prefers_pt
  - multimodal_flexible

profiles:
  - id: cost_efficient
    label: Cost-efficient
    rules:
      - { field: household_income, op: "<", value: 1800, points: 2 }
      - { field: car_availability, op: "not_in", value: [all, some], points: 1 }
      - { field: has_pt_subscription, op: "==", value: true, points: 1 }
      - { field: bike_availability, op: "==", value: all, points: 0.5 }
    preferences:
      - { id: fastest_route, metric: duration, objective: minimize, weight: 0.10 }
      - { id: shortest_distance, metric: distance, objective: minimize, weight: 0.10 }
      - { id: cheapest_option, metric: price, objective: minimize, weight: 0.80, noise_target: true }

  - id: time_efficient
    label: Time-efficient
    rules:
      - { field: employed, op: "==", value: true, points: 2 }
      - { field: has_license, op: "==", value: true, points: 1 }
      - { field: car_availability, op: "==", value: all, points: 1 }
      - { field: household_income, op: ">", value: 3500, points: 1 }
    preferences:
      - { id: fastest_route, metric: duration, objective: minimize, weight: 0.70, noise_target: true }
      - { id: shortest_distance, metric: distance, objective: minimize, weight: 0.20 }
      - { id: cheapest_option, metric: price, objective: minimize, weight: 0.10 }

  - id: prefers_car
    label: Prefers car
    rules:
      - { field: car_availability, op: "==", value: all, points: 2 }
      - { field: car_availability, op: "==", value: some, points: 1 }
      - { field: has_license, op: "==", value: true, points: 1 }
      - { field: employed, op: "==", value: true, points: 0.5 }
    preferences:
      - { id: fastest_route, metric: duration, objective: minimize, weight: 0.55, noise_target: true }
      - { id: shortest_distance, metric: distance, objective: minimize, weight: 0.25 }
      - { id: cheapest_option, metric: price, objective: minimize, weight: 0.20 }

  - id: prefers_bike
    label: Prefers bike
    rules:
      # Home commune (INSEE code on household, from home activity)
      - { field: commune_id, op: in, value: ["31555","31300"], points: 2 }
      
      - { field: home_destination_distance_km, op: "<", value: 5, points: 2 }
      - { field: bike_availability, op: "==", value: all, points: 2 }
      - { field: bike_availability, op: "==", value: some, points: 1 }
      - { field: age, op: between, value: [16, 55], points: 1 }
      - { field: car_availability, op: "not_in", value: [all, some], points: 0.5 }
    preferences:
      - { id: fastest_route, metric: duration, objective: minimize, weight: 0.35, noise_target: true }
      - { id: shortest_distance, metric: distance, objective: minimize, weight: 0.40 }
      - { id: cheapest_option, metric: price, objective: minimize, weight: 0.25 }

  - id: prefers_pt
    label: Prefers public transport
    rules:
      - { field: has_pt_subscription, op: "==", value: true, points: 2 }
      - { field: car_availability, op: "not_in", value: [all, some], points: 1 }
      - { field: household_income, op: "<", value: 2200, points: 1 }
      - { field: has_license, op: "==", value: false, points: 0.5 }
    preferences:
      - { id: fastest_route, metric: duration, objective: minimize, weight: 0.45, noise_target: true }
      - { id: shortest_distance, metric: distance, objective: minimize, weight: 0.05 }
      - { id: cheapest_option, metric: price, objective: minimize, weight: 0.50 }

  - id: multimodal_flexible
    label: Multimodal flexible
    rules:
      - { field: car_availability, op: "==", value: some, points: 1 }
      - { field: bike_availability, op: "==", value: some, points: 1 }
      - { field: has_pt_subscription, op: "==", value: true, points: 1 }
      - { field: employed, op: "==", value: true, points: 1 }
    preferences:
      - { id: fastest_route, metric: duration, objective: minimize, weight: 0.34 }
      - { id: shortest_distance, metric: distance, objective: minimize, weight: 0.33 }
      - { id: cheapest_option, metric: price, objective: minimize, weight: 0.33 }
